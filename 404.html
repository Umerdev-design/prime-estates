<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Prime Estates</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }
    .not-found {
      max-width: 480px;
      padding: 2rem;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .not-found h1 { font-size: 3rem; color: #d4af37; }
  </style>
</head>
<body>
  <div class="not-found">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn't exist or may have moved.</p>
    <a href="/" class="primary-btn">Return Home</a>
  </div>
</body>
</html>
